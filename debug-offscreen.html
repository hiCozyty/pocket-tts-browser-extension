<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PocketVoice Offscreen Self-Test</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #111;
        color: #eee;
        margin: 0;
        padding: 16px;
      }
      h1 { font-size: 14px; margin: 0 0 12px 0; }
      .row { display: flex; gap: 8px; margin: 8px 0; align-items: center; }
      label { font-size: 12px; opacity: 0.8; min-width: 60px; }
      input, button, select {
        font: inherit;
        background: #222;
        color: #eee;
        border: 1px solid #333;
        padding: 4px 8px;
        border-radius: 4px;
      }
      button { cursor: pointer; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      pre {
        background: #000;
        color: #0f0;
        padding: 12px;
        border-radius: 4px;
        height: 320px;
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .ok { color: #4ade80; }
      .err { color: #f87171; }
    </style>
  </head>
  <body>
    <h1>PocketVoice — Offscreen Document Self-Test</h1>
    <p style="font-size:12px;opacity:0.7;margin:0 0 12px 0;">
      This page tests the offscreen document → worker → status pipeline. Open DevTools (F12) for the full console.
    </p>

    <div class="row">
      <label>Voice</label>
      <select id="voice">
        <option value="alba">alba</option>
        <option value="marius">marius</option>
        <option value="javert">javert</option>
        <option value="jean">jean</option>
        <option value="fantine">fantine</option>
        <option value="cosette">cosette</option>
        <option value="eponine">eponine</option>
        <option value="azelma">azelma</option>
      </select>
    </div>

    <div class="row">
      <label>Text</label>
      <input id="text" type="text" style="flex:1" value="Hello from the offscreen document self-test." />
    </div>

    <div class="row">
      <label>HF repo</label>
      <input id="hfRepo" type="text" style="flex:1" value="kyutai/pocket-tts" />
    </div>

    <div class="row">
      <label>HF token</label>
      <input id="hfToken" type="password" style="flex:1" placeholder="optional" />
    </div>

    <div class="row">
      <label>Cache</label>
      <input id="useCache" type="checkbox" checked />
    </div>

    <div class="row">
      <button id="initBtn">1. init worker</button>
      <button id="voiceBtn" disabled>2. prepare voice</button>
      <button id="playBtn" disabled>3. start stream</button>
      <button id="stopBtn" disabled>stop</button>
    </div>

    <pre id="log"></pre>

    <script type="module" src="/src/debug-offscreen.ts"></script>
  </body>
</html>
